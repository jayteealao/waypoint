risks:
  - id: cost-math-precision
    title: OpenRouter usage payload cost precision
    severity: high
    body: "The OpenRouter usage payload includes usage.total_cost (in USD). Prefer this over recomputing from token counts + pricing table to avoid model-swap mispricing. If total_cost is absent (adapter difference), fall back to the pricing table and log a warning."
    mitigation: "Prefer usage.total_cost; treat pricing metadata as config in tiers.ts, not hardcoded constants; unit test the cost path with both present and absent total_cost."

  - id: quota-unit-pivot
    title: Quota unit is daily cost_usd — consumer slices must not assume token counts
    severity: med
    body: "All four generation consumer slices (tutor-interview, roadmap-lesson-generation, quiz-fsrs, adaptation-progress) will call callGateway(). If the quota unit ever pivots to tokens, the gate logic changes in quota.ts only — consumers never see token arithmetic."
    mitigation: "Gateway returns QuotaStatus shape; consumers receive an already-typed result. The usage_events table records prompt_tokens + completion_tokens + cost_usd so a future pivot needs no schema migration."

  - id: structured-tool-call-separation
    title: Structured-output calls and tool calls must never be combined
    severity: med
    body: "Shape's rule: a single request may not use both structured output (JSON mode / response_format) and tool calls. The structured tier enforces this; tiers.ts documents the invariant and a unit test asserts it."
    mitigation: "Encode the invariant as a TypeScript discriminated union on TierCall (either tools OR responseFormat, never both). Unit test asserts callGateway throws on invalid input."

