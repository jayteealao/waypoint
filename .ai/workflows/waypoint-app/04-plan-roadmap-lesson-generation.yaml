risks:
  - id: R1
    title: "Real SSE cadence may expose renderer edge cases"
    severity: high
    body: "The existing stream-driver.ts uses simulated 200ms chunks. Real OpenRouter streaming chunk cadence is irregular — chunks may arrive mid-JSON-line, requiring a line-buffer in the NDJSON parser. If chunk boundaries split a JSON line, naive parsing will fail silently."
    mitigation: "NDJSON parser accumulates bytes in a line buffer and only attempts JSON.parse on newline receipt. Unit-tested with split-chunk fixtures. Schedule the real-transport integration test (wrangler dev + real stream) as step 1 of implementation, not last."

  - id: R2
    title: "NDJSON prompt compliance is model-dependent"
    severity: med
    body: "The lesson model (claude-3.5-haiku) is instructed to emit NDJSON. Models sometimes emit markdown fences, prose headers, or invalid JSON before/after the structured content. Malformed output silently drops sections."
    mitigation: "NDJSON parser skips non-JSON lines with a console.warn. If a section parse fails, the client shows a 'content unavailable' widget fallback (existing registry pattern). Vitest tests cover malformed line handling. Manual smoke with real model before sign-off."

  - id: R3
    title: "Stateless Workers resume requires D1 writes per section"
    severity: med
    body: "Resume-from-last-completed-section requires per-section D1 persistence. If D1 write latency is high under load, the SSE stream pauses mid-section. Additionally, Workers request isolation means in-memory resume state is always cold on reconnect."
    mitigation: "Each section write is fire-and-forget (non-blocking to the SSE stream). The section is sent to the client via SSE immediately; the D1 write happens concurrently. On reconnect, the route reads stored sections (may lag by 1 section on race); acceptable per plan assumptions."

