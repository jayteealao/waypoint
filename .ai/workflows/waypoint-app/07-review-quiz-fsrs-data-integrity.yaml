    msg: Concepts table has no UNIQUE(journey_id, name) constraint; SELECT + conditional INSERT pattern can create duplicate concept rows under concurrent quiz generation for the same waypoint
    evidence: |
      migrations/0000_schema_v1.sql: concepts table has no UNIQUE constraint.
      quiz.ts:100-117: SELECT then INSERT OR IGNORE — OR IGNORE fires only on PRIMARY KEY collision, not on (journey_id, name) collision.
      Under concurrent requests: both can see null and both succeed, creating two concept rows with different UUIDs for the same concept name.
    fix: Add UNIQUE(journey_id, name) to the concepts table and re-fetch the surviving ID after INSERT OR IGNORE. Requires a migration. At v1 single-user scale, concurrent generation for the same waypoint is practically impossible (UI navigates away on quiz click), so risk is very low.
