summary: FSRS card updates are atomic per-concept. Attempt insertion is followed by FSRS update in sequence — a failure leaves the attempt recorded but the card un-updated (acceptable at v1). One LOW: the concepts table lacks a UNIQUE constraint on (journey_id, name), making duplicate concept rows possible under concurrent generation requests.
