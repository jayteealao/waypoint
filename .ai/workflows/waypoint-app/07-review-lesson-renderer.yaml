    msg: >
      DOMPurify dynamic import guard (typeof document !== 'undefined') prevents
      runtime execution on the server, but Vite's tree-shaker cannot statically
      eliminate the branch, so the ~74KB gzipped library appears in the SSR bundle.
      Fix requires ssr.noExternal/conditions override or Rollup external rule —
      a build-config change outside this slice's scope.
