    fixed-at: "2026-07-11T20:15:00Z"
    msg: >
      <button type="button" role="radio"> creates a native/ARIA semantic conflict;
      VoiceOver and NVDA announce the element as both "button" and "radio button".
      Fixed per WAI-ARIA APG pattern: replaced with <div role="radio">. Existing
      onKeyDown handler (Enter/Space) retained; no keyboard regression.
    fix: "Changed <button role='radio'> to <div role='radio'> in CheckpointQuestion.tsx:80"
