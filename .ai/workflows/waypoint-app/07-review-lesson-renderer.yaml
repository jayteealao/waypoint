    surfaced-at: "2026-07-11T20:02:45Z"
    fixed-at: "2026-07-11T20:15:00Z"
    msg: >
      getLesson accepted only lessonId; any authenticated user could fetch another
      user's lesson by guessing an ID. Fixed by adding waypointId parameter and
      AND waypoint_id = ? predicate. Callers must now supply both IDs; ownership
      mismatch returns null, preventing existence leakage.
    fix: "Added waypointId param to validator; updated query to WHERE id = ? AND waypoint_id = ? in src/server/lessons.ts:41"
  - id: A11Y-1
    severity: med
