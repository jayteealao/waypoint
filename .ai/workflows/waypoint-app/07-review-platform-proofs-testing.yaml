    msg: "Adapter-swap test (AC-PP3) proves interface symmetry at the TypeScript type level but uses createMockAIClient() (not the fallback or native client) to run the schema assertions — does not confirm that fallbackClient.complete() and nativeClient.complete() produce the same shape in a mock scenario."
    evidence:
      snippet: |
        const fallbackClient: AIClient = createOpenAIFallbackClient('test-key')
        const nativeClient: AIClient = createOpenRouterClient('test-key')
        // Both variables satisfy the same interface shape at runtime.
        for (const client of [fallbackClient, nativeClient] as const) {
          expect(typeof client.complete).toBe('function')
        }
        // Run the same schema assertions using the mock (no network).
        const mockClient: AIClient = createMockAIClient()
        const result = await mockClient.complete(TEST_MESSAGES, TEST_TOOLS)
      failure_scenario: "If createOpenAIFallbackClient's complete() throws or returns a different shape, this test would pass but AC-PP3 would not be truly proven."
    fix: "Wire a network mock (vi.spyOn on fetch or MSW) to stub the OpenAI API response, then run fallbackClient.complete() and assert the same schema. Deferred to ai-gateway slice which adds the full mock harness."
