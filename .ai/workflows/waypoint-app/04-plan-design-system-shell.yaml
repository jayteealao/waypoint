risks:
  - id: R1
    title: "Token rename completeness — teal remnants break visuals"
    level: med
    body: "25+ .demo-* CSS classes reference old token names. A missed rename passes typecheck but renders visually wrong. Grep before/after step 1 is the only gate."
    mitigation: "Run `grep -r '--sea-ink\\|--lagoon\\|--palm' src/ tests/` before and after the rename step; fail-fast if any hits survive."
  - id: R2
    title: "_authenticated layout route beforeLoad may not fire on direct / navigation in TanStack Router 1.170.x"
    level: med
    body: "Pathless layout route redirect behavior changed in some Router 1.x minor versions. If beforeLoad on the layout does not fire before the index route renders, the dashboard briefly flashes before redirecting to sign-in."
    mitigation: "Verify in step 7 Playwright test: direct-navigate to / without a session and assert redirect to /sign-in within 200ms."
  - id: R3
    title: "OKLCH browser support — older mobile browsers"
    level: low
    body: "OKLCH is not supported in Chrome < 111, Firefox < 113, Safari < 16.4. A user on an older browser sees no color (black/white fallback)."
    mitigation: "Acceptable for v1 modern-browser target. Add a CSS @supports fallback for --ember in styles.css pointing to a safe hex value (#c2611a)."
  - id: R4
    title: "Seeded-session Playwright tests behind BETTER_AUTH_SECRET wall"
    level: low
    body: "AC-DSS1, AC-DSS3, AC-DSS4 Playwright tests require a seeded user session (BETTER_AUTH_SECRET). Without the secret the tests skip/fail in CI."
    mitigation: "Pre-registered deferral under the existing AC-ADL1+AC-ADL5 entry. Proxy: sign-in page token rendering, contrast.test.ts, reduced-motion test all pass without auth."
history: "Initial plan — authored autonomously as part of design-system-shell planning stage."
