summary: "The fix swaps a dead <Button> for a <Link to=\"/journey/$journeyId/progress\" params={{ journeyId: journey.id }}> carrying the literal btn-base/btn-secondary/btn-sm classes — the exact class output the existing Button(variant=\"secondary\", size=\"sm\") primitive renders, and the same Link-styled-as-button pattern already used in 7 other files (JourneysDashboard.tsx's empty-state CTA, QuizView.tsx, both waypoint routes, both sample routes). No new component, no new CSS, no hand-rolled styling. The companion test's React.createElement + `as any` boilerplate is necessitated by vitest.config.ts's include glob (src/**/*.test.ts only, no .tsx), not an oversight, and its two-route memory-history router is the minimum needed to assert both AC-1 (real navigation) and AC-2 (real anchor). No open simplification findings."
