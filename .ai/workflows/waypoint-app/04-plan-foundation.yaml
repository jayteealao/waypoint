risks:
  - id: risk-1
    title: "@tanstack/cli create is alpha"
    severity: med
    body: "The scaffold CLI may produce stale output, fail, or emit an unexpected template. Fall back to composing the Start scaffold manually from the official TanStack Start + Cloudflare guide if the CLI fails."
    mitigation: "Plan Step 2 includes the manual fallback path. The scaffold output is fully audited in Step 4 regardless of origin."
  - id: risk-2
    title: "CI platform requires a remote"
    severity: low
    body: "The GitHub Actions workflow cannot run until the repo is pushed to GitHub. AC-F4 (CI gate) is deferred until a remote exists. The local test-harness ACs prove the tooling works before any remote is needed."
    mitigation: "AC-F4 carries constraint-resolution: proxy+deferral cleared by first push to GitHub remote."
  - id: risk-3
    title: "Exact pinning requires manual upgrades"
    severity: low
    body: "No floating version ranges means dependency security patches require explicit human-reviewed lockfile bumps. Accepted by PO at intake. CI pnpm audit catches newly-published CVEs."
    mitigation: "pnpm audit step in CI; Renovate or manual triage on any new critical."
history: []
