risks:
  - id: risk-sse-workerd
    title: "SSE streaming may not work under workerd"
    severity: high
    body: "toServerSentEventsResponse() under workerd is inferred-not-documented per shape. If it fails, the streaming architecture requires a shape-level rethink."
    mitigation: "Prove it in isolation first (demo route); surface immediately rather than working around it. The shape explicitly names this as the early proof."

  - id: risk-openrouter-toolcall
    title: "OpenRouter native adapter tool calling may still be broken"
    severity: med
    body: "Broke May 2026, reportedly fixed June. If broken at impl time, the OpenAI-adapter-baseURL fallback becomes the default — this slice explicitly proves that swap is zero-callsite-change."
    mitigation: "Both adapters are plumbed and tested; the swap test (AC-PP3) provides mechanical evidence the fallback is real."

  - id: risk-api-key-absent
    title: "OpenRouter API key may be unavailable at implement time"
    severity: low
    body: "The live-tagged AI smoke test requires OPENROUTER_API_KEY. If absent, the mocked proof is the immediate evidence; the live variant is the pre-registered residual."
    mitigation: "Live test uses test.skipIf(!OPENROUTER_API_KEY); mocked test always runs. Residual cleared by tagged live-smoke run."

history: "initial authoring 2026-07-11"
