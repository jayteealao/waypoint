    msg: "collectFirstToolCall() has no timeout — a hung AI provider stream would block the Worker indefinitely until Cloudflare's 30s CPU limit kills it with a generic error."
    evidence:
      snippet: |
        for await (const chunk of stream as AsyncIterable<Record<string, unknown>>) {
          if (chunk['type'] === 'TOOL_CALL_START') { ...
          } else if (chunk['type'] === 'TOOL_CALL_END') {
            break  // hangs if this never arrives
          }
        }
      failure_scenario: "OpenRouter provider times out mid-stream → for-await loop runs until Cloudflare's 30s CPU deadline → Worker crashes with a generic error instead of a clean 504/timeout response."
    fix: "Wrap with AbortController + setTimeout: const ac = new AbortController(); const t = setTimeout(() => ac.abort(), 25_000); try { ... } finally { clearTimeout(t); } Pass signal to the chat() call. Deferred to ai-gateway slice."
