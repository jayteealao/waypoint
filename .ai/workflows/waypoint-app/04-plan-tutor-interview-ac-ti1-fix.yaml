risks:
  - id: risk-1
    title: "Misdiagnosis into the wrong layer"
    severity: high
    body: "The three candidate causes need distinct fixes (test-only hydration/actionability gate vs. mock-flow fix vs. real state-machine regression). Jumping to the hydration gate without confirming the stuck stage could mask a genuine app regression, or a viewport-actionability fix could paper over a real client defect."
    mitigation: "Diagnose-first is a hard gate (plan Step 1): capture screenshot + accessibility/text snapshot at the failing line 267 BEFORE any edit; only then pick the layer. State-machine unit coverage (lines 128-130) and the fully-populated MOCK_QUESTIONS table are corroborating evidence the fault is not in domain/mock, but the runtime snapshot is authoritative."
  - id: risk-2
    title: "Test-only gate hides a real client hydration defect"
    severity: med
    body: "If the true cause is a React 19 event-attach gap on the mid-flow chip interaction (not just the initial mount, which is already gated at line 222), a broader auto-wait in the spec could make the test pass while real users still hit a dead chip on the first post-mount click."
    mitigation: "If diagnosis shows the initial-mount gate is insufficient for subsequent interactions, treat it as a client defect (candidate 1, app-side) and fix in InterviewView, not by loosening the assertion. Study-sources read of react-dom 19 + @playwright/test actionability precedes the mechanism choice (RIM-E3)."
  - id: risk-3
    title: "Real source fix must not ship without unit proof"
    severity: med
    body: "AC-TI1F3 requires that a real app/state-machine regression fix is covered by unit tests, not just the e2e green. Skipping this would leave the regression class undetected next time."
    mitigation: "Conditional unit case in tests/smoke/interview-state-machine.test.ts wired into the plan; only exercised on the source-fix branch."

