summary: "Clean: the Continue control is now a real @tanstack/react-router Link that renders a native <a href>, so it is natively Tab-focusable and Enter-activatable with no custom keyboard handling required. aria-label={`Continue ${journey.title}`} is carried over unchanged from the old Button and is confirmed live in the DOM by JourneyCard.test.ts (screen.findByRole('link', { name: `Continue ${journey.title}` })), giving 4.1.2 Name/Role/Value a passing accessible name. The decorative ArrowRight icon keeps aria-hidden='true' (unchanged context line). Visible text 'Continue' is a literal prefix of the accessible name 'Continue {title}', satisfying WCAG 2.5.3 Label in Name (no mismatch — a screen-reader or voice-control user who reads/says 'Continue' matches the start of the accessible name). Focus-visible styling is unaffected: the Link reuses the exact btn-base/btn-secondary/btn-sm classes the old Button applied (src/components/ui/Button.tsx builds the same className string), so it gets both the universal :focus-visible outline (src/styles.css:194-198) and .btn-secondary:not(:disabled):focus-visible box-shadow (src/styles.css:293-295) with no regression."
