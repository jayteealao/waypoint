    msg: "DrawerNav uses CSS animation (not transition) for entry, and display:none for close — no exit animation. Drawer disappears abruptly on close. CSS animations are not interruptible; rapid open-close sequences cause abrupt snap-to-hidden."
    evidence: |
      @media (prefers-reduced-motion: no-preference) {
        .wp-drawer { animation: wp-drawer-in var(--motion-slow) both; }
      }
      Close is achieved by adding Tailwind 'hidden' class (display:none).
      No exit animation; no wp-drawer-out keyframe.
    fix: "Consider switching from CSS animation to CSS transition with transform:translateX(-100%) and visibility:hidden/visible, enabling both entry and exit animations. Or accept current abrupt close as intentional. Defer: requires design decision on exit animation preference."
