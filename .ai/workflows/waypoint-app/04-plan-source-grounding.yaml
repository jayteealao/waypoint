risks:
  - id: R1
    title: "Fetch-in-interview adds latency to sources turn"
    severity: med
    body: "fetchSourceUrl has a 30s timeout. An unresponsive host will hold the interview turn open for 30s before returning the failure message. The 3s NFR is only on interview turns, and the sources stage is the final probe stage — PO accepted this at shape. Mitigated by the template failure path (no gateway call), but the timeout itself is the wall."
    mitigation: "Log the fetch duration; consider a shorter 10s abort for the interview path (adjust in source-fetch.ts). Document in .env.example."
  - id: R2
    title: "Context-window budget with large sources"
    severity: med
    body: "Injecting 5000 chars of source text into the lesson prompt increases token count, which increases cost and increases the chance of hitting the premium tier's context limit. The 5000-char truncation mitigates but does not eliminate this."
    mitigation: "5000-char truncation is the v1 budget. The gateway's usage_events table captures cost_usd — watch it at the live smoke. If cost spikes, reduce truncation to 3000 chars."
  - id: R3
    title: "Injection resistance is probabilistic at the model layer"
    severity: low
    body: "The ## Source material block and data-only labeling reduce but do not eliminate prompt-injection risk. The widget registry and DOMPurify sanitization bound the blast radius if the model is successfully manipulated."
    mitigation: "Adversarial fixture tests pin the prompt contract. Defense in depth (widget registry, sanitization) already in place from lesson-renderer slice."

