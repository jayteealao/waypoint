risks:
  - id: risk-1
    title: "OAuth app registrations are PO-owned prerequisites"
    severity: med
    body: "Google and GitHub OAuth app registrations (client IDs and secrets) are external actions only the PO can perform. The test-proxy path (seeded sessions, mocked providers) keeps the build green, but the full two-account isolation interactive proof requires real OAuth apps on a deployed URL."
    mitigation: "Playwright tests use a seeded-session proxy (direct D1 insert via a test helper) for automated runs. Real OAuth residual pre-registered in shape; cleared by first successful Google+GitHub sign-in on a deployed environment."
  - id: risk-2
    title: "TanStack DB beta QueryCollection API may have shifted"
    severity: med
    body: "@tanstack/db is at v0.6 beta. The QueryCollection + server-function syncer pattern and browser persistence wiring may differ at install time from shape-era documentation."
    mitigation: "Resolve against the installed package TypeScript types at implement time. Fallback: plain TanStack Query for journey data in this slice if QueryCollection proves unstable — the AC (reactive reads, no per-render round-trip) can still be met with useQuery + stale-while-revalidate."
  - id: risk-3
    title: "Whole-schema-up-front risks speculative columns"
    severity: low
    body: "Shipping a complete 8-table schema before most tables have consumers creates a window where schema and code diverge. Every table maps to a named AC in a later slice — nothing is speculative — but schema review is part of implementation."
    mitigation: "Every table is traced to a slice AC in the schema migration file comments. Schema review is a named implementation step."
history: []
