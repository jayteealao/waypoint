files:
  - path: package.json
    status: modified
    role: infra
    module: deps
    delta: { add: 3, rem: 0 }
    planned_change: "Add @tanstack/db and @tanstack/react-db (exact-pinned at install time)"
  - path: worker-configuration.d.ts
    status: new
    role: infra
    module: deps
    planned_change: "Generated by `wrangler types` — typed Env interface (DB: D1Database, BETTER_AUTH_SECRET: string, GOOGLE_CLIENT_ID: string, GOOGLE_CLIENT_SECRET: string, GITHUB_CLIENT_ID: string, GITHUB_CLIENT_SECRET: string)"
  - path: src/cloudflare-workers.d.ts
    status: modified
    role: infra
    module: deps
    delta: { add: 2, rem: 4 }
    planned_change: "Update stub to reference the generated worker-configuration.d.ts; keep module declaration for cloudflare:workers with typed Env imported from the generated file"
  - path: migrations/0000_schema_v1.sql
    status: new
    role: domain
    module: migrations
    planned_change: "Full v1 schema: better-auth core tables (user, session, account) + domain tables (journeys, waypoints, lessons, quiz_questions, quiz_attempts, concepts, concept_fsrs_cards, usage_events). CREATE TABLE IF NOT EXISTS for idempotency. quiz_questions includes a `type` column (TEXT DEFAULT 'mc') to leave the future task type unforeclose."
  - path: wrangler.jsonc
    status: modified
    role: config
    module: migrations
    delta: { add: 4, rem: 0 }
    planned_change: "Add migrations_dir: 'migrations' to the d1_databases entry so `wrangler d1 migrations apply` resolves the migration directory"
  - path: src/db/schema.ts
    status: new
    role: domain
    module: migrations
    planned_change: "TypeScript type definitions for all domain tables (Journey, Waypoint, Lesson, QuizQuestion, QuizAttempt, Concept, ConceptFsrsCard, UsageEvent) mirroring the SQL schema"
  - path: src/lib/auth.ts
    status: modified
    role: domain
    module: auth
    delta: { add: 35, rem: 10 }
    planned_change: "Expand from spike-minimal config to full OAuth config with Google and GitHub social providers. Add trustedOrigins, baseURL, secret from env bindings. Export Auth type for client-side createAuthClient."
  - path: src/lib/auth-client.ts
    status: new
    role: domain
    module: auth
    planned_change: "Client-side better-auth client via createAuthClient pointing to /api/auth. Exports useSession(), signIn.social(), signOut() for use in React components."
  - path: src/routes/api/auth/$.ts
    status: modified
    role: domain
    module: auth
    delta: { add: 6, rem: 4 }
    planned_change: "Replace `(env as any).DB` cast with typed Env from worker-configuration.d.ts. Pass all required secret bindings (GOOGLE_CLIENT_ID etc.) to createAuth."
  - path: src/lib/auth-guard.ts
    status: new
    role: domain
    module: guard
    planned_change: "requireAuth(request) → Session — fetches session from better-auth, throws Response(401) if absent. requireOwnership(sessionUserId, resourceUserId) → void — throws Response(403) if IDs differ. Both are pure/sync enough to be tested in regular Vitest."
  - path: src/server/journeys.ts
    status: new
    role: domain
    module: server-fns
    planned_change: "listJourneys, getJourney, createJourney, updateJourney server functions (createServerFn). Each begins with requireAuth(); queries are filtered by user_id so cross-account rows are structurally unreachable, then requireOwnership() is called on individual resource access."
  - path: src/lib/store/journeys.ts
    status: new
    role: domain
    module: store
    planned_change: "TanStack DB QueryCollection for journeys. Syncer calls listJourneys server function. Browser persistence via IndexedDB adapter. Exports useJourneys() React hook for use in later UI slices."
  - path: src/routes/sign-in.tsx
    status: new
    role: ui
    module: ui
    planned_change: "Minimal sign-in screen at /sign-in. Google and GitHub OAuth buttons using signIn.social(). Redirects to / on successful sign-in. Uses Tailwind for basic layout; will be restyled by design-system-shell (accepted rework per slice definition)."
  - path: src/routes/account.tsx
    status: new
    role: ui
    module: ui
    planned_change: "Account surface at /account. beforeLoad redirects to /sign-in if unauthenticated. Shows provider, display name, avatar (if present). Sign-out button calls signOut() then navigates to /sign-in."
  - path: tests/smoke/auth-guard.test.ts
    status: new
    role: infra
    module: tests
    planned_change: "requireOwnership unit tests in regular Vitest (pure function — no Workers runtime needed): cross-user rejection, same-user pass, unauthenticated (no session) rejection. requireAuth tested with a mock session factory."
  - path: tests/smoke/schema.test.ts
    status: new
    role: infra
    module: tests
    planned_change: "Reads migrations/0000_schema_v1.sql as a string; asserts: only CREATE TABLE IF NOT EXISTS (no bare CREATE TABLE), expected table names present, FSRS card columns present (due, stability, difficulty, reps, lapses, state, last_review), quiz_questions has a `type` column."
  - path: tests/smoke/db-collections.test.ts
    status: new
    role: infra
    module: tests
    planned_change: "TanStack DB QueryCollection smoke: wires the collection over a mock listJourneys that returns a fixture array; asserts the collection returns the expected rows synchronously after the first sync cycle."
  - path: tests/e2e/auth-flow.spec.ts
    status: new
    role: infra
    module: tests
    planned_change: "Playwright: two browser contexts (context-A and context-B). Uses a test helper that seeds two users and sessions directly into miniflare D1 (bypassing OAuth) — proxy for the real OAuth residual. Asserts: context-A sees only its journeys, context-B sees none. Account surface shows correct identity. Sign-out clears session and redirects to /sign-in."
