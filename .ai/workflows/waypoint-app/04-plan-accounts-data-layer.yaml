  - id: deps
    label: "Dependencies & generated types"
    role: infra
  - id: migrations
    label: "D1 schema migrations"
    role: domain
  - id: auth
    label: "OAuth config & auth client"
    role: domain
  - id: guard
    label: "Server-side authorization guard"
    role: domain
  - id: server-fns
    label: "Server functions (data gateway)"
    role: domain
  - id: store
    label: "TanStack DB client store"
    role: domain
  - id: ui
    label: "Auth & account surfaces"
    role: ui
  - id: tests
    label: "Test suites"
