risks:
  - id: risk-schema-contract
    title: "Lesson schema is a 3-slice contract"
    severity: high
    detail: "sample-journey, roadmap-lesson-generation, and quiz-fsrs all write against the LessonDocument type. An unversioned field rename or type change after those slices begin forces coordinated rework across 3 slices."
    mitigation: "Ship LessonDocumentV1 with a version: 1 discriminant on day one. Additive changes (new section type) are backward-compatible; removal or rename requires a migration. Plan review covers the schema before any implementation proceeds."

  - id: risk-dompurify-ssr
    title: "DOMPurify requires browser DOM — not available in Worker SSR"
    severity: high
    detail: "TanStack Start SSR runs in Cloudflare Workers (workerd). DOMPurify's isSupported check may return false in the Worker context because document.createHTMLDocument may not be available. If sanitize.ts calls DOMPurify unconditionally during SSR, the Worker crashes."
    mitigation: "sanitize.ts guards typeof document !== 'undefined' AND DOMPurify.isSupported before calling sanitize(); on SSR fallback it returns the plain-text-escaped version of the input (HTML tags stripped via regex, not parsed). Hydration then re-sanitizes with the full DOMPurify call client-side. This is the minimum-surprise approach."

  - id: risk-progressive-playwright
    title: "DOM-mutation timing tests are inherently flaky"
    severity: med
    detail: "AC-LR3 measures that content appears before the stream completes. If the test assertion fires too early or the stream finishes faster than expected, assertions fail intermittently in CI."
    mitigation: "useSimulatedStream uses a fixed 200ms/section interval with a fixture that has ≥6 sections (total stream ~1.2s). The Playwright test asserts visible content BEFORE a 600ms mark (halfway point), giving 600ms of margin. The stream delay is a test-only constant, not production behavior."

