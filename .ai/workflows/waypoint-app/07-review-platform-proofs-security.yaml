    msg: "Hardcoded fallback secret 'dev-secret-replace-in-prod' (8 chars) used if BETTER_AUTH_SECRET env var is unset — weak session signing key if deployed without the env var."
    evidence:
      snippet: "secret: (process.env['BETTER_AUTH_SECRET'] as string | undefined) ?? 'dev-secret-replace-in-prod',"
      failure_scenario: "Deploy to production without BETTER_AUTH_SECRET set → all sessions signed with well-known string 'dev-secret-replace-in-prod' → attacker who knows the key can forge session tokens."
    fix: "Add a startup check: if (!process.env['BETTER_AUTH_SECRET'] && process.env['NODE_ENV'] === 'production') throw new Error('BETTER_AUTH_SECRET must be set in production'); Deferred to accounts-data-layer which configures production secrets."
