artifact: instrument
framework: "Cloudflare Workers observability (console.log → Logpush) + D1 usage_events table"
signals:
  - name: "generation.started"
    kind: log
    path: "app/lib/ai/gateway.ts:startGeneration"
    note: "Emit at the start of every LLM call: user_id, model, generation_type (interview|lesson|quiz|roadmap), estimated_prompt_tokens. Enables in-flight cost estimation and latency measurement."
  - name: "generation.completed"
    kind: log
    path: "app/lib/ai/gateway.ts:completeGeneration"
    pii: false
    note: "Emit on success or failure after every LLM call: user_id, model, generation_type, prompt_tokens, completion_tokens, cost_usd (from OpenRouter usage payload), duration_ms, outcome (success|failure|fallback). This row is also written to D1 usage_events."
  - name: "generation.cost_usd"
    kind: histogram
    path: "app/lib/ai/gateway.ts:completeGeneration"
    note: "Cost in USD per generation call, by model and type. Used for quota enforcement and operator cost reporting."
  - name: "generation.duration_ms"
    kind: histogram
    path: "app/lib/ai/gateway.ts:completeGeneration"
    note: "Wall-clock duration of each LLM call from first token request to last token received. By model and type. AC NFR: lesson first-content < 5s; interview turn < 3s."
  - name: "model.fallback_triggered"
    kind: log
    path: "app/lib/ai/gateway.ts:handleFallback"
    note: "Emit when the primary model fails and a fallback is triggered: user_id, original_model, fallback_model, reason (timeout|error|quota|tool-call-regression). Named after the May 2026 OpenRouter adapter regression."
  - name: "quota.rejected"
    kind: log
    path: "app/lib/ai/quota.ts:checkQuota"
    note: "Emit when a user's generation request is rejected due to quota exhaustion: user_id, quota_limit, quota_used, request_type. Must be emitted BEFORE any LLM call is made."
  - name: "interview.turn_completed"
    kind: log
    path: "app/lib/ai/interview.ts:completeTurn"
    note: "Emit after each interview turn: user_id, journey_id, turn_number, model, latency_ms, question_type (consent|knowledge|scope|mission|sources). AC NFR: turn < 3s."
  - name: "workers.observability_enabled"
    kind: event
    path: "wrangler.jsonc:observability"
    note: "Cloudflare Workers built-in observability (console.log → Logpush). Enabled in wrangler.jsonc by the foundation slice. This is the collector — all other log signals route through here at zero marginal cost."
dark_paths: []
pii_warnings: 0
