name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Added by wf ship-plan build — plan v2, 2026-07-12 (full history for commitlint range)
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate route types
        run: pnpm generate-routes

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Added by wf ship-plan build — plan v2, 2026-07-12
      - name: Format check
        run: pnpm exec oxfmt --check .

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e --project=chromium

      - name: Supply-chain audit
        run: pnpm audit --audit-level=high

      - name: Pin-check (no floating ranges in package.json)
        run: |
          node -e "
            const p = require('./package.json');
            const deps = { ...p.dependencies, ...p.devDependencies };
            const drifted = Object.entries(deps)
              .filter(([, v]) => v.startsWith('^') || v.startsWith('~') || v === 'latest')
              .map(([k, v]) => k + '@' + v);
            if (drifted.length > 0) {
              console.error('Floating ranges detected:', drifted.join(', '));
              process.exit(1);
            }
            console.log('All dependencies are exactly pinned.');
          "

      # Added by wf ship-plan build — plan v2, 2026-07-12
      - name: Commit lint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      # Added by wf ship-plan build — plan v2, 2026-07-12
      - name: Publish dry-run
        run: pnpm run build && pnpm exec wrangler deploy --dry-run --outdir dist

  # Added by wf ship-plan build — plan v2, 2026-07-12
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
