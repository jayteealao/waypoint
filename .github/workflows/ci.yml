name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Added by wf ship-plan build — plan v2, 2026-07-12 (full history for commitlint range)
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate route types
        run: pnpm generate-routes

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Added by wf ship-plan build — plan v2, 2026-07-12
      - name: Format check
        run: pnpm exec oxfmt --check .

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Placeholder runtime secrets for the local `vite dev`/miniflare app the E2E
      # suite drives. /health does a presence-only check (never validates values),
      # so placeholders make the all-present path reachable in CI. BETTER_AUTH_SECRET
      # is intentionally NOT exported to the test runner's env, so the seeded-session
      # specs (which gate on process.env.BETTER_AUTH_SECRET) keep skipping as before.
      - name: Provision E2E dev vars
        run: |
          cat > .dev.vars <<'EOF'
          BETTER_AUTH_SECRET=e2e-ci-placeholder-secret-0000000000000000
          BETTER_AUTH_API_KEY=e2e-ci-placeholder
          OPENROUTER_API_KEY=e2e-ci-placeholder
          BETTER_AUTH_BASE_URL=http://localhost:3000
          GOOGLE_CLIENT_ID=e2e-ci-placeholder
          GOOGLE_CLIENT_SECRET=e2e-ci-placeholder
          GITHUB_CLIENT_ID=e2e-ci-placeholder
          GITHUB_CLIENT_SECRET=e2e-ci-placeholder
          EOF

      - name: End-to-end tests
        run: pnpm test:e2e --project=chromium

      # Advisory supply-chain scan (OSV-Scanner, maintained). Non-blocking:
      # continue-on-error guarantees the step never fails CI (the scanner exits
      # non-zero on a finding). Replaces `pnpm audit`, whose npm quick-audit
      # endpoint was retired (HTTP 410). Findings surface in the Actions log.
      - name: Supply-chain audit (advisory)
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - name: Pin-check (no floating ranges in package.json)
        run: |
          node -e "
            const p = require('./package.json');
            const deps = { ...p.dependencies, ...p.devDependencies };
            const drifted = Object.entries(deps)
              .filter(([, v]) => v.startsWith('^') || v.startsWith('~') || v === 'latest')
              .map(([k, v]) => k + '@' + v);
            if (drifted.length > 0) {
              console.error('Floating ranges detected:', drifted.join(', '));
              process.exit(1);
            }
            console.log('All dependencies are exactly pinned.');
          "

      # Added by wf ship-plan build — plan v2, 2026-07-12
      - name: Commit lint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      # Added by wf ship-plan build — plan v2, 2026-07-12
      - name: Publish dry-run
        run: pnpm run build && pnpm exec wrangler deploy --dry-run --outdir dist

  # Added by wf ship-plan build — plan v2, 2026-07-12
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
